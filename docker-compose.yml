services:
  web:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEFAULT_LOCALE: zh-CN
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
